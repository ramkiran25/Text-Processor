<div class="login-container">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
    <h2>System Access Gateway</h2>

    <div class="alert error-alert" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="form-control">
      <label for="loginUsername">Username</label> <input 
        type="text" 
        id="loginUsername" 
        formControlName="username" 
        placeholder="Enter user credentials..."
        [disabled]="isLoading"
      />
    </div>

    <div class="form-control">
      <label for="loginPassword">Password</label> <input 
        type="password" 
        id="loginPassword" 
        formControlName="password" 
        placeholder="Enter master password..."
        [disabled]="isLoading"
      />
    </div>

    <div class="button-group">
      <button 
        type="submit" 
        [disabled]="loginForm.invalid || isLoading">
        <span>{{ isLoading ? 'Verifying Credentials...' : 'Secure Login →' }}</span>
      </button>
    </div>
  </form>
</div>
